<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AuditFlow - Création Template</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: #0f0f12; color: #fff; }
    
    .app { display: flex; min-height: 100vh; }
    
    .sidebar {
      width: 260px;
      background: #16161a;
      border-right: 1px solid rgba(255,255,255,0.06);
      padding: 24px 16px;
    }
    
    .logo {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 40px;
      padding-left: 12px;
    }
    
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 10px;
      color: #8b8b9a;
      cursor: pointer;
      margin-bottom: 4px;
    }
    
    .nav-item:hover { background: rgba(255,255,255,0.04); color: #fff; }
    .nav-item.active { background: rgba(99, 102, 241, 0.15); color: #a5b4fc; }
    
    .main { flex: 1; padding: 32px; overflow-y: auto; }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }
    
    h1 { font-size: 28px; font-weight: 700; }
    
    .btn-back {
      padding: 10px 20px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #8b8b9a;
      cursor: pointer;
      font-size: 14px;
    }
    
    .btn-save {
      padding: 12px 24px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    
    .form-container { max-width: 800px; }
    
    .form-section {
      background: #1a1a20;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
    }
    
    .form-section h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #a5b4fc;
    }
    
    .form-group { margin-bottom: 20px; }
    
    .form-group label {
      display: block;
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 8px;
    }
    
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 12px 16px;
      background: #16161a;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      outline: none;
    }
    
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      border-color: #6366f1;
    }
    
    .category-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    
    .category-tag {
      padding: 6px 14px;
      background: rgba(99, 102, 241, 0.15);
      border: 1px solid rgba(99, 102, 241, 0.3);
      border-radius: 20px;
      font-size: 12px;
      color: #a5b4fc;
      cursor: pointer;
    }
    
    .category-tag.selected {
      background: #6366f1;
      color: #fff;
    }
    
    .question-card {
      background: #16161a;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    
    .question-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    
    .question-number {
      font-size: 12px;
      color: #6366f1;
      font-weight: 600;
    }
    
    .question-actions {
      display: flex;
      gap: 8px;
    }
    
    .btn-icon {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.1);
      background: transparent;
      color: #6b7280;
      cursor: pointer;
      font-size: 14px;
    }
    
    .btn-icon:hover { background: rgba(255,255,255,0.05); color: #fff; }
    
    .question-type {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    
    .type-btn {
      padding: 6px 12px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: #6b7280;
      font-size: 12px;
      cursor: pointer;
    }
    
    .type-btn.active {
      background: rgba(99, 102, 241, 0.2);
      border-color: #6366f1;
      color: #a5b4fc;
    }
    
    .btn-add-question {
      width: 100%;
      padding: 16px;
      background: transparent;
      border: 2px dashed rgba(255,255,255,0.1);
      border-radius: 12px;
      color: #6b7280;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-add-question:hover {
      border-color: #6366f1;
      color: #a5b4fc;
    }
    
    .drag-handle {
      cursor: grab;
      color: #6b7280;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo">⚡ AuditFlow</div>
      <div class="nav-item" onclick="window.location.href='dashboard.html'">
        <span>📊</span>
        <span>Dashboard</span>
      </div>
      <div class="nav-item" onclick="window.location.href='dashboard.html'">
        <span>📝</span>
        <span>Mes audits</span>
      </div>
      <div class="nav-item active">
        <span>📋</span>
        <span>Templates</span>
      </div>
      <div class="nav-item" onclick="window.location.href='settings.html'">
        <span>⚙️</span>
        <span>Paramètres</span>
      </div>
    </aside>
    
    <main class="main">
      <div class="header">
        <div style="display: flex; align-items: center; gap: 16px;">
          <button class="btn-back" onclick="window.location.href='dashboard.html'">← Retour</button>
          <h1>Nouveau Template</h1>
        </div>
        <button class="btn-save">Enregistrer le template</button>
      </div>
      
      <div class="form-container">
        <div class="form-section">
          <h2>Informations générales</h2>
          <div class="form-group">
            <label>Nom du template</label>
            <input type="text" placeholder="Ex: Audit Qualité Laboratoire">
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea placeholder="Décrivez l'objectif de ce template..."></textarea>
          </div>
          <div class="form-group">
            <label>Catégories</label>
            <input type="text" placeholder="Ajouter une catégorie...">
            <div class="category-tags">
              <span class="category-tag selected">Qualité</span>
              <span class="category-tag">Sécurité</span>
              <span class="category-tag">Labo</span>
            </div>
          </div>
        </div>
        
        <div class="form-section">
          <h2>Questions (5)</h2>
          
          <div class="question-card">
            <div class="question-header">
              <span class="question-number">QUESTION 1</span>
              <div class="question-actions">
                <span class="drag-handle">⋮⋮</span>
                <button class="btn-icon">📋</button>
                <button class="btn-icon">🗑</button>
              </div>
            </div>
            <div class="form-group">
              <input type="text" placeholder="Intitulé de la question..." value="Les équipements sont-ils régulièrement entretenus ?">
            </div>
            <div class="question-type">
              <button class="type-btn active">Oui/Non</button>
              <button class="type-btn">Texte</button>
              <button class="type-btn">Choix multiple</button>
              <button class="type-btn">Note 1-5</button>
              <button class="type-btn">Image</button>
            </div>
          </div>
          
          <div class="question-card">
            <div class="question-header">
              <span class="question-number">QUESTION 2</span>
              <div class="question-actions">
                <span class="drag-handle">⋮⋮</span>
                <button class="btn-icon">📋</button>
                <button class="btn-icon">🗑</button>
              </div>
            </div>
            <div class="form-group">
              <input type="text" placeholder="Intitulé de la question..." value="Quelle est la fréquence de maintenance ?">
            </div>
            <div class="question-type">
              <button class="type-btn">Oui/Non</button>
              <button class="type-btn">Texte</button>
              <button class="type-btn active">Choix multiple</button>
              <button class="type-btn">Note 1-5</button>
              <button class="type-btn">Image</button>
            </div>
            <div class="form-group">
              <input type="text" placeholder="Option 1" value="Hebdomadaire" style="margin-bottom: 8px;">
              <input type="text" placeholder="Option 2" value="Mensuel" style="margin-bottom: 8px;">
              <input type="text" placeholder="Option 3" value="Trimestriel">
            </div>
          </div>
          
          <div class="question-card">
            <div class="question-header">
              <span class="question-number">QUESTION 3</span>
              <div class="question-actions">
                <span class="drag-handle">⋮⋮</span>
                <button class="btn-icon">📋</button>
                <button class="btn-icon">🗑</button>
              </div>
            </div>
            <div class="form-group">
              <input type="text" placeholder="Intitulé de la question..." value="Ajouter des photos des équipements">
            </div>
            <div class="question-type">
              <button class="type-btn">Oui/Non</button>
              <button class="type-btn">Texte</button>
              <button class="type-btn">Choix multiple</button>
              <button class="type-btn">Note 1-5</button>
              <button class="type-btn active">Image</button>
            </div>
          </div>
          
          <div class="question-card">
            <div class="question-header">
              <span class="question-number">QUESTION 4</span>
              <div class="question-actions">
                <span class="drag-handle">⋮⋮</span>
                <button class="btn-icon">📋</button>
                <button class="btn-icon">🗑</button>
              </div>
            </div>
            <div class="form-group">
              <input type="text" placeholder="Intitulé de la question..." value="Niveau de conformité estimé">
            </div>
            <div class="question-type">
              <button class="type-btn">Oui/Non</button>
              <button class="type-btn">Texte</button>
              <button class="type-btn">Choix multiple</button>
              <button class="type-btn active">Note 1-5</button>
              <button class="type-btn">Image</button>
            </div>
          </div>
          
          <div class="question-card">
            <div class="question-header">
              <span class="question-number">QUESTION 5</span>
              <div class="question-actions">
                <span class="drag-handle">⋮⋮</span>
                <button class="btn-icon">📋</button>
                <button class="btn-icon">🗑</button>
              </div>
            </div>
            <div class="form-group">
              <input type="text" placeholder="Intitulé de la question..." value="Observations supplémentaires">
            </div>
            <div class="question-type">
              <button class="type-btn">Oui/Non</button>
              <button class="type-btn active">Texte</button>
              <button class="type-btn">Choix multiple</button>
              <button class="type-btn">Note 1-5</button>
              <button class="type-btn">Image</button>
            </div>
          </div>
          
          <button class="btn-add-question">+ Ajouter une question</button>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
