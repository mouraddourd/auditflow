# Sync Rules PowerSync pour AuditFlow
# Définit quelles données sont synchronisées pour chaque utilisateur
# Documentation: https://docs.powersync.com/usage/sync-rules

bucket_definitions:
  # Données globales (templates publics)
  global_templates:
    # Tous les utilisateurs reçoivent les templates publics
    data:
      - SELECT * FROM templates WHERE is_public = true
      - SELECT q.* FROM questions q
        JOIN templates t ON q.template_id = t.id
        WHERE t.is_public = true

  # Données de l'organisation
  organization_data:
    parameters: user_id
    data:
      # Organisations dont l'utilisateur est membre
      - SELECT o.* FROM organizations o
        JOIN organization_members om ON o.id = om.organization_id
        WHERE om.user_id = bucket.user_id

      # Membres des organisations de l'utilisateur
      - SELECT om.* FROM organization_members om
        WHERE om.organization_id IN (
          SELECT organization_id FROM organization_members WHERE user_id = bucket.user_id
        )

      # Templates des organisations de l'utilisateur
      - SELECT t.* FROM templates t
        WHERE t.organization_id IN (
          SELECT organization_id FROM organization_members WHERE user_id = bucket.user_id
        )

      # Questions des templates des organisations
      - SELECT q.* FROM questions q
        JOIN templates t ON q.template_id = t.id
        WHERE t.organization_id IN (
          SELECT organization_id FROM organization_members WHERE user_id = bucket.user_id
        )

      # Audits des organisations de l'utilisateur
      - SELECT a.* FROM audits a
        WHERE a.organization_id IN (
          SELECT organization_id FROM organization_members WHERE user_id = bucket.user_id
        )

      # Réponses des audits des organisations
      - SELECT ans.* FROM answers ans
        JOIN audits au ON ans.audit_id = au.id
        WHERE au.organization_id IN (
          SELECT organization_id FROM organization_members WHERE user_id = bucket.user_id
        )

# Paramètres globaux
# (token expiration, etc.)
