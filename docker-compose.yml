services:
  # PostgreSQL with logical replication enabled
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: auditflow
      POSTGRES_PASSWORD: auditflow_password
      POSTGRES_DB: auditflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    command: >
      postgres 
      -c wal_level=logical
      -c max_replication_slots=10
      -c max_wal_senders=10
      -c shared_preload_libraries=pg_stat_statements
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auditflow -d auditflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  # PowerSync Service (self-hosted)
  powersync:
    image: journeyapps/powersync-service:latest
    environment:
      # Database connection
      DATABASE_URL: postgresql://auditflow:auditflow_password@postgres:5432/auditflow
      DATABASE_SSL: "false"
      
      # PowerSync configuration
      POWERSYNC_PUBLIC_KEY: |
        -----BEGIN PUBLIC KEY-----
        MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEA2xH6...
        -----END PUBLIC KEY-----
      
      # Sync rules file path (mounted volume)
      SYNC_RULES_PATH: /config/powersync-sync-rules.yml
      
      # JWT secret (use a strong secret in production)
      JWT_SECRET: your-jwt-secret-key-change-in-production
      
      # Logging
      LOG_LEVEL: info
    ports:
      - "8080:8080"
    volumes:
      - ./powersync.yaml:/app/powersync.yaml:ro
      - ./powersync-sync-rules.yml:/config/powersync-sync-rules.yml:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/probes/liveness', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Express API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://auditflow:auditflow_password@postgres:5432/auditflow
      POWERSYNC_URL: http://powersync:8080
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      powersync:
        condition: service_healthy

volumes:
  postgres_data:
